<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Квадус - Події</title>
  <style>
    html { font-family: 'Courier New', Courier, monospace; display: inline-block; text-align: center; }
    h1 { color: white; margin: 20px 0; }
    #grad1 {
      min-height: 100vh;
      background-image: linear-gradient(to bottom right, #2c3e50, #000000);
      padding: 20px;
      box-sizing: border-box;
    }
    
    .log-container {
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 15px;
      width: 95%;
      max-width: 600px;
      margin: 15px auto;
      color: #2ecc71;
      text-align: left;
      height: 400px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.9rem;
      white-space: pre-wrap;
    }

    .button {
      display: inline-block; background-color: #34495e; border: none; border-radius: 8px;
      color: white; padding: 15px 30px; text-decoration: none; font-size: 1.1rem;
      margin: 10px; cursor: pointer; transition: 0.3s; width: 80%; max-width: 300px;
    }
    .button:hover { background-color: #2c3e50; }
    .button-clear { background-color: #e74c3c; }
    .button-clear:hover { background-color: #c0392b; }
  </style>
</head>
<body>
  <div id="grad1">
    <h1>Журнал подій</h1>
    
    <div id="logBox" class="log-container">Завантаження...</div>

    <button class="button" onclick="loadLogs()">ОНОВИТИ</button>
    <br>
    <a href="/" id="backLink"><button class="button" id="backBtn">НА ГОЛОВНУ</button></a>
  </div>

<script>
    function loadLogs() {
        const urlParams = new URLSearchParams(window.location.search);
        const day = urlParams.get('day');
        let url = '/logs';
        if (day) {
            url += '?day=' + day;
            const titleEl = document.querySelector('h1');
            if (titleEl) {
                titleEl.textContent = 'Журнал подій за ' + day.replace('_', '.');
            }
            const backLink = document.getElementById('backLink');
            const backBtn = document.getElementById('backBtn');
            if (backLink && backBtn) {
                backLink.href = '/archive';
                backBtn.textContent = 'НАЗАД ДО СПИСКУ';
            }
        }

        fetch(url)
            .then(response => response.text())
            .then(text => {
                const box = document.getElementById('logBox');
                box.textContent = text;
                box.scrollTop = box.scrollHeight;
            });
    }

    document.addEventListener('DOMContentLoaded', loadLogs);
</script>
</body>
</html>
