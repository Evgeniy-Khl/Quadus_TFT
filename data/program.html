<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Квадус - Редагування програм</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            color: #ffffff;
        }
        .selector-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }
        label {
            font-size: 1.1rem;
            font-weight: bold;
            color: #cbd5e1;
        }
        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.8);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            min-width: 200px;
            transition: border-color 0.2s;
        }
        select:focus {
            border-color: #3b82f6;
        }
        .quick-fill-btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
            display: inline-block;
            font-weight: 600;
        }
        .quick-fill-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 800px;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        th {
            background-color: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            vertical-align: middle;
        }
        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.01);
        }
        tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        input[type="number"] {
            width: 70px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            text-align: center;
            outline: none;
            font-size: 0.9rem;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"]:focus {
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2563eb;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            min-width: 150px;
        }
        .btn-save {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.35);
            background: linear-gradient(135deg, #2ecc71 0%, #2ecc71 100%);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-2px);
        }
        .popup {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            text-align: center;
            min-width: 250px;
        }
        .popup.active {
            display: block;
        }
        .popup p {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .popup button {
            padding: 8px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .popup button:hover {
            background: #2563eb;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Редагування погодинної програми</h2>
        
        <div class="selector-group">
            <div>
                <label for="progSelect">Оберіть програму: </label>
                <select id="progSelect" onchange="loadProgram()">
                    <option value="1">Програма №1</option>
                    <option value="2">Програма №2</option>
                    <option value="3">Програма №3</option>
                    <option value="4">Програма №4</option>
                </select>
            </div>
            <div style="font-size: 0.9rem; color: #94a3b8;">
                * Всі температури в °C. Заслінка в %.
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2">Година</th>
                        <th colspan="2">Температура T0 (Сухий)</th>
                        <th colspan="2">Температура T1 / Волог.</th>
                        <th colspan="3">Заслінка (Flap)</th>
                        <th rowspan="2">
                            Увімкнути хвл.<br>
                            <button class="quick-fill-btn" onclick="fillColumn('water2run')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                    </tr>
                    <tr>
                        <th>
                            Вкл<br>
                            <button class="quick-fill-btn" onclick="fillColumn('spT0on')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Вимк<br>
                            <button class="quick-fill-btn" onclick="fillColumn('spT0off')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Вкл<br>
                            <button class="quick-fill-btn" onclick="fillColumn('spT1on')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Вимк<br>
                            <button class="quick-fill-btn" onclick="fillColumn('spT1off')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Мін (%)<br>
                            <button class="quick-fill-btn" onclick="fillColumn('flapMin')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Макс (%)<br>
                            <button class="quick-fill-btn" onclick="fillColumn('flapMax')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                        <th>
                            Робоча (%)<br>
                            <button class="quick-fill-btn" onclick="fillColumn('flapCurr')" title="Скопіювати значення з 00:00 на всі години">Заповнити</button>
                        </th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Буде згенеровано через JS -->
                </tbody>
            </table>
        </div>

        <div class="btn-group">
            <button class="btn btn-save" onclick="saveProgram()">Зберегти зміни</button>
            <a href="/" class="btn btn-back">Назад</a>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <p id="popupMessage">Збереження...</p>
        <button onclick="closePopup()">OK</button>
    </div>

    <script>
        // Генерація рядків таблиці
        const tbody = document.getElementById("tableBody");
        for (let h = 0; h < 24; h++) {
            const tr = document.createElement("tr");
            const hourStr = h.toString().padStart(2, '0') + ":00";
            
            tr.innerHTML = `
                <td><strong>${hourStr}</strong></td>
                <td><input type="number" step="0.1" id="t0on_${h}" data-param="spT0on"></td>
                <td><input type="number" step="0.1" id="t0off_${h}" data-param="spT0off"></td>
                <td><input type="number" step="0.1" id="t1on_${h}" data-param="spT1on"></td>
                <td><input type="number" step="0.1" id="t1off_${h}" data-param="spT1off"></td>
                <td><input type="number" min="0" max="100" id="fmin_${h}" data-param="flapMin"></td>
                <td><input type="number" min="0" max="100" id="fmax_${h}" data-param="flapMax"></td>
                <td><input type="number" min="0" max="100" id="fcurr_${h}" data-param="flapCurr"></td>
                <td><input type="number" min="0" max="59" id="w2_${h}" data-param="water2run"></td>
            `;
            tbody.appendChild(tr);
        }

        // Функція швидкого заповнення стовпчика значенням з 00:00 години
        function fillColumn(paramName) {
            let sourceVal;
            const input0 = document.querySelector(`input[data-param="${paramName}"]`);
            
            if (input0.type === "checkbox") {
                sourceVal = input0.checked;
            } else {
                sourceVal = parseFloat(input0.value);
            }

            if (isNaN(sourceVal) && input0.type !== "checkbox") {
                alert("Будь ласка, введіть коректне значення в рядок 00:00 перед автозаповненням.");
                return;
            }

            const inputs = document.querySelectorAll(`input[data-param="${paramName}"]`);
            inputs.forEach((input, index) => {
                if (index > 0) {
                    if (input.type === "checkbox") {
                        input.checked = sourceVal;
                    } else {
                        input.value = sourceVal;
                    }
                }
            });
        }

        // Завантаження програми з сервера
        function loadProgram() {
            const prg = document.getElementById("progSelect").value;
            showPopup("Завантаження даних програми...", false);

            fetch(`/getprogram?prg=${prg}`)
                .then(res => {
                    if (!res.ok) throw new Error("Не вдалося завантажити програму");
                    return res.json();
                })
                .then(data => {
                    data.forEach(hData => {
                        const h = hData.hour;
                        document.getElementById(`t0on_${h}`).value = hData.spT0on.toFixed(1);
                        document.getElementById(`t0off_${h}`).value = hData.spT0off.toFixed(1);
                        document.getElementById(`t1on_${h}`).value = hData.spT1on.toFixed(1);
                        document.getElementById(`t1off_${h}`).value = hData.spT1off.toFixed(1);
                        document.getElementById(`fmin_${h}`).value = hData.flapMin;
                        document.getElementById(`fmax_${h}`).value = hData.flapMax;
                        document.getElementById(`fcurr_${h}`).value = hData.flapCurr;
                        document.getElementById(`w2_${h}`).value = hData.water2run;
                    });
                    hidePopup();
                })
                .catch(err => {
                    showPopup("Помилка завантаження: " + err.message, true);
                });
        }

        // Збереження програми на сервер
        function saveProgram() {
            const prg = document.getElementById("progSelect").value;
            const payload = [];

            for (let h = 0; h < 24; h++) {
                const spT0on = parseFloat(document.getElementById(`t0on_${h}`).value);
                const spT0off = parseFloat(document.getElementById(`t0off_${h}`).value);
                const spT1on = parseFloat(document.getElementById(`t1on_${h}`).value);
                const spT1off = parseFloat(document.getElementById(`t1off_${h}`).value);
                const flapMin = parseInt(document.getElementById(`fmin_${h}`).value);
                const flapMax = parseInt(document.getElementById(`fmax_${h}`).value);
                const flapCurr = parseInt(document.getElementById(`fcurr_${h}`).value);
                const water2run = parseInt(document.getElementById(`w2_${h}`).value);

                if (isNaN(spT0on) || isNaN(spT0off) || isNaN(spT1on) || isNaN(spT1off) || isNaN(flapMin) || isNaN(flapMax) || isNaN(flapCurr) || isNaN(water2run)) {
                    alert(`Будь ласка, заповніть всі поля для години ${h.toString().padStart(2, '0')}:00.`);
                    return;
                }

                payload.push({
                    hour: h,
                    spT0on: spT0on,
                    spT0off: spT0off,
                    spT1on: spT1on,
                    spT1off: spT1off,
                    flapMin: flapMin,
                    flapMax: flapMax,
                    flapCurr: flapCurr,
                    water2run: water2run
                });
            }

            showPopup("Збереження програми у пам'ять...", false);

            fetch(`/setprogram?prg=${prg}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) throw new Error("Помилка збереження на сервері");
                return res.json();
            })
            .then(data => {
                if (data.status === "ok") {
                    showPopup("Програму успішно збережено у пам'ять приладу!", true);
                } else {
                    showPopup("Помилка при збереженні програми.", true);
                }
            })
            .catch(err => {
                showPopup("Помилка збереження: " + err.message, true);
            });
        }

        // Робота з поп-апом
        function showPopup(message, showBtn) {
            document.getElementById("popupMessage").innerHTML = message;
            const btn = document.querySelector("#popup button");
            if (showBtn) {
                btn.style.display = "inline-block";
            } else {
                btn.style.display = "none";
            }
            document.getElementById("popup").classList.add("active");
            document.getElementById("overlay").classList.add("active");
        }

        function hidePopup() {
            document.getElementById("popup").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }

        function closePopup() {
            hidePopup();
        }

        // Завантажуємо дані для Програми №1 при завантаженні сторінки
        window.onload = loadProgram;
    </script>
</body>
</html>
